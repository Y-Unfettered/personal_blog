
services:
  blog-api:
    build:
      context: .
      dockerfile: deploy/Dockerfile.api
    container_name: blog-api
    restart: unless-stopped
    environment:
      - ADMIN_HOST=0.0.0.0
      - ADMIN_PORT=3030
    volumes:
      - ./data:/app/data
      - ./public:/app/public
    networks:
      - blog-net

  blog-web:
    build:
      context: .
      dockerfile: deploy/Dockerfile.web
    container_name: blog-web
    restart: unless-stopped
    depends_on:
      - blog-api
    ports:
      - "80:80"
    networks:
      - blog-net

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: blog-cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CF_TUNNEL_TOKEN}
    depends_on:
      - blog-web
    networks:
      - blog-net

networks:
  blog-net:
    driver: bridge
