
services:
  blog-api:
    build:
      context: .
      dockerfile: deploy/Dockerfile.api
    container_name: blog-api
    restart: unless-stopped
    environment:
      - ADMIN_HOST=0.0.0.0
      - ADMIN_PORT=3030
      - BLOG_DATA_DIR=/app/data/seed
    volumes:
      - ${BLOG_DATA_DIR:-/srv/blog-data}/seed:/app/data/seed
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3030/api/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - blog-net

  blog-web:
    build:
      context: .
      dockerfile: deploy/Dockerfile.web
    container_name: blog-web
    restart: unless-stopped
    depends_on:
      blog-api:
        condition: service_healthy
    ports:
      - "80:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - blog-net

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: blog-cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CF_TUNNEL_TOKEN}
    depends_on:
      blog-web:
        condition: service_healthy
    networks:
      - blog-net

networks:
  blog-net:
    driver: bridge
